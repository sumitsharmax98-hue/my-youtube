<!DOCTYPE html>
<html lang="hi">
<head>
    <title>SumitTube - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">
    <nav class="p-6 bg-gray-900 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent">📱 SumitTube</h1>
            <a href="upload.html" class="bg-red-600 px-8 py-3 rounded-full hover:bg-red-700 font-bold transition-all shadow-lg shadow-red-900/20 active:scale-95">➕ Upload</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold text-gray-100">📺 My Videos</h2>
            <button onclick="loadVideos()" class="bg-blue-600 px-6 py-2 rounded-full hover:bg-blue-700 transition-colors flex items-center gap-2 font-semibold">🔄 Refresh</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="videoGrid">
            </div>

        <div id="noVideos" class="text-center py-24 text-gray-500 hidden">
            <div class="text-8xl mb-6">🎥</div>
            <h3 class="text-2xl mb-4 font-semibold text-white">Koi video nahi mili!</h3>
            <p class="mb-8 text-gray-400">Pehli video upload karke shuruwat karein.</p>
            <a href="upload.html" class="bg-red-600 px-10 py-4 rounded-full font-bold text-white shadow-xl hover:bg-red-700 transition-all inline-block">Upload Video</a>
        </div>
    </div>

    <script>
        // Videos load karne ka function
        function loadVideos() {
            const videos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
            const grid = document.getElementById('videoGrid');
            const noVideos = document.getElementById('noVideos');
            
            grid.innerHTML = '';
            
            if (videos.length === 0) {
                noVideos.classList.remove('hidden');
                return;
            }
            
            noVideos.classList.add('hidden');
            
            videos.forEach((video, index) => {
                grid.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden hover:border-red-500/50 transition-all group relative cursor-pointer shadow-lg" onclick="playVideo('${video.url}')">
                        <button onclick="deleteVideo(event, ${index})" class="absolute top-4 right-4 bg-red-6
