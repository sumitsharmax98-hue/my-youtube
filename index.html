<!DOCTYPE html>
<html>
<head>
    <title>SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">
    <nav class="p-6 bg-gray-900 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent">📱 SumitTube</h1>
            <a href="upload.html" class="bg-red-600 px-8 py-3 rounded-full hover:bg-red-700 font-bold">➕ Upload</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">📺 My Videos</h2>
            <button onclick="refreshVideos()" class="bg-blue-600 px-6 py-2 rounded-full hover:bg-blue-700">🔄 Refresh</button>
        </div>
        
        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="noVideos" class="text-center py-20 text-gray-500 hidden">
            <div class="text-6xl mb-4">🎥</div>
            <h3 class="text-2xl mb-2">No videos yet</h3>
            <a href="upload.html" class="bg-red-600 px-8 py-3 rounded-full font-bold">Upload First Video</a>
        </div>
    </div>

    <script>
        function loadVideos() {
            const videos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
            const grid = document.getElementById('videoGrid');
            const noVideos = document.getElementById('noVideos');
            
            grid.innerHTML = '';
            
            if (videos.length === 0) {
                noVideos.classList.remove('hidden');
                return;
            }
            
            noVideos.classList.add('hidden');
            
            videos.forEach((video, index) => {
                grid.innerHTML += `
                    <div class="bg-gray-800 rounded-xl p-4 hover:bg-gray-700 cursor-pointer group relative" onclick="playVideo('${video.url}')">
                        <button onclick="deleteVideo(event, ${index})" class="absolute top-2 right-2 bg-red-600/80 hover:bg-red-600 text-white w-8 h-8 rounded-full z-10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center shadow-lg">
                            ✕
                        </button>
                        
                        <div class="relative aspect-video mb-4 overflow-hidden rounded-lg bg-black">
                            <video src="${video.url}" class="w-full h-full object-cover" preload="metadata"></video>
                            <div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/40 transition-all">
                                <span class="text-2xl opacity-0 group-hover:opacity-100 transition-opacity">▶️</span>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg truncate">${video.name}</h3>
                        <p class="text-gray-400 text-xs mt-1">${video.size} • ${video.time}</p>
                    </div>
                `;
            });
        }

        function deleteVideo(event, index) {
            // Video play hone se rokne ke liye
            event.stopPropagation();
            
            if(confirm("Kya aap is video ko delete karna chahte hain?")) {
                let videos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
                videos.splice(index, 1); // List se video hataya
                localStorage.setItem('sumittube-videos', JSON.stringify(videos)); // Update memory
                loadVideos(); // UI refresh
            }
        }
        
        function refreshVideos() {
            loadVideos();
        }
        
        function playVideo(url) {
            const modal = document.createElement('div');
            modal.id = 'videoModal';
            modal.className = "fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4";
            modal.innerHTML = `
                <div class="relative w-full max-w-4xl">
                    <video src="${url}" controls class="w-full rounded-lg shadow-2xl" autoplay></video>
                    <button onclick="document.getElementById('videoModal').remove()" 
                        class="absolute -top-12 right-0 bg-red-600 text-white w-10 h-10 rounded-full font-bold text-xl hover:bg-red-700 flex items-center justify-center">
                        ×
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        // Initial Load
        loadVideos();
    </script>
</body>
</html>
