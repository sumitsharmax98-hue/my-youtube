<!DOCTYPE html>
<html>
<head>
    <title>SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">
    <nav class="p-6 bg-gray-900 sticky top-0">
        <div class="max-w-6xl mx-auto flex justify-between">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent">📱 SumitTube</h1>
            <a href="upload.html" class="bg-red-600 px-8 py-3 rounded-full hover:bg-red-700 font-bold">➕ Upload</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <h2 class="text-3xl font-bold mb-8">📺 My Videos</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="videoGrid">
            <!-- Your uploaded videos auto-load here -->
        </div>
    </div>

    <script>
        // Load uploaded videos from localStorage
        const videos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
        const grid = document.getElementById('videoGrid');
        
        videos.forEach(video => {
            grid.innerHTML += `
                <div class="bg-gray-800 rounded-xl p-6 hover:bg-gray-700 cursor-pointer" onclick="playVideo('${video.url}')">
                    <video src="${video.url}" class="w-full rounded-lg mb-4 aspect-video object-cover" muted></video>
                    <h3 class="font-bold text-xl mb-2">${video.name}</h3>
                    <p class="text-gray-400">${video.size} • ${video.time}</p>
                </div>
            `;
        });
        
        function playVideo(url) {
            const modal = document.createElement('div');
            modal.innerHTML = `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;">
                    <div style="position:relative;">
                        <video src="${url}" controls style="width:90vw;max-width:800px;height:50vh;" autoplay></video>
                        <button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:20px;right:20px;background:red;color:white;border:none;padding:10px 15px;border-radius:50%;cursor:pointer;font-size:20px;">×</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
    </script>
</body>
</html>
