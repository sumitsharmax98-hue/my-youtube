<!DOCTYPE html>
<html lang="hi">
<head>
    <title>Upload - SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8 min-h-screen">
    <div class="max-w-2xl mx-auto">
        <a href="index.html" class="text-2xl mb-8 block hover:text-red-400">← Home</a>
        <h1 class="text-4xl font-bold mb-12 text-center">📤 Video Upload</h1>
        
        <!-- Fixed Upload Button -->
        <div class="border-4 border-dashed border-gray-500 rounded-3xl p-16 text-center hover:border-red-400 cursor-pointer transition-all mb-12">
            <div class="text-6xl mb-6">🎥</div>
            <h2 class="text-3xl font-bold mb-4">Click to Upload</h2>
            <button id="uploadButton" class="bg-red-600 hover:bg-red-700 px-12 py-4 rounded-2xl text-xl font-bold">
                📱 Select Video
            </button>
            <p class="text-gray-400 mt-4 text-lg">MP4 • FREE • 50MB max</p>
        </div>
        
        <!-- Status -->
        <div id="status" class="text-center font-bold text-xl mb-8 hidden"></div>
        
        <!-- Videos -->
        <div id="videos" class="space-y-6"></div>
    </div>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>
    <script>
        // ✅ dkyka4sut + free-upload preset READY!
        const CLOUD_NAME = 'dkyka4sut';
        
        document.getElementById('uploadButton').addEventListener('click', function() {
            document.getElementById('status').textContent = '🔄 Opening upload...';
            document.getElementById('status').classList.remove('hidden');
            
            cloudinary.openUploadWidget({
                cloudName: CLOUD_NAME,
                uploadPreset: 'free-upload',
                sources: ['local'],
                multiple: false,
                maxFiles: 1,
                fileType: 'video',
                maxFileSize: 50000000  // 50MB
            }, (error, result) => {
                if (!error && result.event === 'success') {
                    document.getElementById('status').innerHTML = '✅ <span class="text-green-400">Upload Complete!</span>';
                    showVideo(result.info.secure_url, result.info.original_filename);
                } else if (error) {
                    document.getElementById('status').innerHTML = '❌ <span class="text-red-400">' + error.message + '</span>';
                }
            });
        });
        
        function showVideo(url, name) {
            document.getElementById('videos').innerHTML = `
                <div class="bg-gray-800 p-8 rounded-2xl border-2 border-green-500">
                    <video src="${url}" controls class="w-full rounded-xl mb-6 aspect-video object-cover" autoplay muted></video>
                    <div class="flex flex-wrap gap-4 justify-between items-center">
                        <div>
                            <h3 class="text-2xl font-bold mb-1">${name}</h3>
                            <p class="text-green-400 font-semibold mb-2">✅ Live on SumitTube!</p>
                            <a href="${url}" class="text-blue-400 hover:text-blue-300" target="_blank">🔗 Direct Link</a>
                        </div>
                        <div class="flex gap-2">
                            <a href="${url}" download class="bg-green-600 hover:bg-green-700 p-3 rounded-xl">
                                ⬇️ Download
                            </a>
                            <a href="${url}" target="_blank" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-xl">
                                📱 Share
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
