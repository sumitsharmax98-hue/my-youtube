<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .upload-card { transition: all 0.3s; }
        .upload-card:hover { transform: translateY(-5px); border-color: #f43f5e; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <nav class="flex justify-between items-center mb-12">
            <a href="index.html" class="text-3xl font-black bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent">
                📱 SumitTube
            </a>
            <a href="index.html" class="text-gray-400 hover:text-white font-medium">← Back to Home</a>
        </nav>

        <div id="dropZone" class="upload-card border-4 border-dashed border-gray-700 rounded-[2.5rem] p-10 md:p-20 text-center bg-gray-800/20 backdrop-blur-xl relative overflow-hidden">
            
            <div id="uploadContent">
                <div class="text-7xl mb-8">🎥</div>
                <h1 class="text-4xl font-black mb-4">Upload Video</h1>
                <p class="text-gray-400 mb-10 text-lg">Videos are saved permanently on Cloudinary</p>
                
                <input type="file" id="fileInput" accept="video/*" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" 
                    class="bg-red-600 hover:bg-red-700 text-white px-12 py-5 rounded-2xl text-xl font-bold shadow-2xl shadow-red-900/40 transition-all active:scale-95">
                    SELECT FILE
                </button>
            </div>

            <div id="processingUI" class="hidden flex flex-col items-center justify-center py-10">
                <div class="w-20 h-20 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                <h2 class="text-3xl font-bold text-red-500 mb-2">Uploading...</h2>
                <p class="text-gray-400">Please wait, sending to cloud.</p>
            </div>
        </div>
    </div>

    <script>
        // ✅ APKI UPDATED DETAILS
        const CLOUD_NAME = "dkyka4sut"; 
        const UPLOAD_PRESET = "free-upload"; 

        const fileInput = document.getElementById('fileInput');
        const uploadContent = document.getElementById('uploadContent');
        const processingUI = document.getElementById('processingUI');

        fileInput.onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show Loader
            uploadContent.classList.add('hidden');
            processingUI.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                // Cloudinary API Call
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.secure_url) {
                    let videos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
                    videos.unshift({
                        url: data.secure_url,
                        name: file.name,
                        size: (file.size / 1048576).toFixed(1) + ' MB',
                        time: new Date().toLocaleString('hi-IN')
                    });
                    localStorage.setItem('sumittube-videos', JSON.stringify(videos));

                    processingUI.innerHTML = `
                        <div class="text-7xl mb-6">✅</div>
                        <h2 class="text-3xl font-bold text-green-500">Success!</h2>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // Yahan error dikhega agar preset galat hua toh
                    alert("Error: " + (data.error ? data.error.message : "Upload failed"));
                    location.reload();
                }
            } catch (err) {
                console.error(err);
                alert("Network Error! Please try again.");
                location.reload();
            }
        };
    </script>
</body>
</html>
