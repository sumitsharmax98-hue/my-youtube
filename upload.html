<script>
    // Aapki Cloudinary Details
    const CLOUD_NAME = "dkyka4sut"; 
    const UPLOAD_PRESET = "f1301a4e-d3da-4e5e-8c72-829a919cbe82"; 

    const fileInput = document.getElementById('fileInput');
    const uploadContent = document.getElementById('uploadContent');
    const processingUI = document.getElementById('processingUI');

    fileInput.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // UI Updates - Loader dikhao
        uploadContent.classList.add('opacity-0');
        processingUI.classList.remove('hidden');

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            // Cloudinary API ko video bhej rahe hain
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.secure_url) {
                // Ab sirf Cloudinary ka PERMANENT link save hoga
                let videos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
                videos.unshift({
                    url: data.secure_url, // Ye link hamesha chalega
                    name: file.name,
                    size: (file.size / 1000000).toFixed(1) + 'MB',
                    time: new Date().toLocaleString('hi-IN')
                });
                localStorage.setItem('sumittube-videos', JSON.stringify(videos));

                // Success message
                processingUI.innerHTML = `
                    <div class="text-8xl mb-8">✅</div>
                    <h2 class="text-3xl font-bold text-green-500 mb-4">Cloud Upload Done!</h2>
                    <p class="text-xl text-gray-400">Video hamesha ke liye save ho gayi hai.</p>
                `;
                
                // 1.5 second baad home page
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } else {
                // Agar Cloudinary koi error de (jaise preset galat ho)
                alert("Cloudinary Error: " + (data.error ? data.error.message : "Upload fail ho gaya"));
                location.reload();
            }
        } catch (err) {
            alert("Internet Connection check karein!");
            location.reload();
        }
    };
</script>
