<!DOCTYPE html>
<html lang="hi">
<head>
    <title>Upload - SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8 min-h-screen">
    <div class="max-w-2xl mx-auto">
        <a href="index.html" class="text-2xl mb-8 block hover:text-red-400">← Home</a>
        <h1 class="text-4xl font-bold mb-12 text-center">📤 Video Upload</h1>
        
        <div class="border-4 border-dashed border-gray-500 rounded-3xl p-16 text-center hover:border-red-400 mb-12">
            <div class="text-6xl mb-6">🎥</div>
            <button id="uploadBtn" class="bg-red-600 hover:bg-red-700 px-12 py-4 rounded-2xl text-xl font-bold">
                📱 Select Video
            </button>
            <p class="text-gray-400 mt-4">Upload successful = Home pe dikhega!</p>
        </div>
        
        <div id="status"></div>
        <div id="videos"></div>
    </div>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>
    <script>
        const CLOUD_NAME = 'dkyka4sut';
        
        document.getElementById('uploadBtn').onclick = () => {
            document.getElementById('status').innerHTML = '<div class="text-yellow-400 font-bold">🔄 Upload opening...</div>';
            
            cloudinary.openUploadWidget({
                cloudName: CLOUD_NAME,
                uploadPreset: 'free-upload',
                sources: ['local']
            }, (error, result) => {
                if (!error && result.event === 'success') {
                    const video = {
                        url: result.info.secure_url,
                        name: result.info.original_filename,
                        size: (result.info.bytes/1e6).toFixed(1) + 'MB',
                        time: new Date().toLocaleString()
                    };
                    
                    // UNIVERSAL STORAGE - SAB JAGAH SYNC!
                    let allVideos = JSON.parse(localStorage.getItem('sumittube-videos') || '[]');
                    allVideos.unshift(video);
                    localStorage.setItem('sumittube-videos', JSON.stringify(allVideos));
                    
                    document.getElementById('status').innerHTML = `
                        <div class="text-green-400 font-bold text-2xl mb-4">✅ UPLOAD SUCCESS!</div>
                        <a href="index.html" class="bg-green-600 px-8 py-4 rounded-xl font-bold block hover:bg-green-700 mb-4">🏠 Go to Home - Video Dikhega!</a>
                        <div class="bg-gray-800 p-6 rounded-xl">
                            <video src="${video.url}" controls class="w-full rounded mb-4 aspect-video"></video>
                            <h3 class="font-bold text-xl">${video.name}</h3>
                        </div>
                    `;
                } else {
                    document.getElementById('status').innerHTML = `<div class="text-red-400 font-bold">❌ ${error?.message || 'Unknown error'}</div>`;
                }
            });
        }
    </script>
</body>
</html>
