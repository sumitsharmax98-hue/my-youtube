<script>
        // 1. CONFIGURATION
        const CLOUD_NAME = "dkyka4sut"; 
        const UPLOAD_PRESET = "free-upload"; 

        // 2. ✅ APNA NAYA TOKEN YAHAN 3 TUKDON MEIN DALO
        const part1 = "ghp_PAHLE_10_CHAR"; 
        const part2 = "BEECH_KE_CHARACTERS";
        const part3 = "AAKHRI_KE_CHARACTERS";
        const GITHUB_TOKEN = part1 + part2 + part3;

        const REPO_OWNER = "sumitsharmax98-hue";
        const REPO_NAME = "my-youtube";

        const fileInput = document.getElementById('fileInput');
        const statusLabel = document.getElementById('statusLabel');
        const subStatus = document.getElementById('subStatus');

        fileInput.onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // UI badlo
            document.getElementById('uploadContent').classList.add('hidden');
            document.getElementById('processingUI').classList.remove('hidden');

            try {
                // --- STEP 1: CLOUDINARY UPLOAD ---
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                    method: 'POST',
                    body: formData
                });
                const cloudData = await cloudRes.json();
                
                if (!cloudData.secure_url) throw new Error("Cloudinary fail!");

                // --- STEP 2: GITHUB AUTO-SYNC ---
                statusLabel.innerText = "Syncing...";
                subStatus.innerText = "Updating Database on GitHub";

                const newVideo = {
                    url: cloudData.secure_url,
                    name: file.name,
                    size: (file.size / 1048576).toFixed(1) + ' MB',
                    time: new Date().toLocaleString('hi-IN')
                };

                // Latest data.json fetch karo (Anti-cache ke saath)
                const ghGet = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json?t=${new Date().getTime()}`, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });

                if (ghGet.status !== 200) throw new Error("GitHub file fetch error!");

                const ghFileData = await ghGet.json();
                const currentJSON = JSON.parse(decodeURIComponent(escape(atob(ghFileData.content))));

                if(!currentJSON.videos) currentJSON.videos = [];
                currentJSON.videos.unshift(newVideo); // Nayi video sabse upar

                // Push back to GitHub
                const ghPut = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Upload: " + file.name,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentJSON, null, 2)))),
                        sha: ghFileData.sha
                    })
                });

                if(ghPut.ok) {
                    statusLabel.innerText = "Success! ✅";
                    subStatus.innerText = "Redirecting to Home...";
                    // 3 second wait taaki GitHub Pages refresh ho jaye
                    setTimeout(() => window.location.href = 'index.html', 3000);
                } else {
                    throw new Error("GitHub update failed!");
                }

            } catch (err) {
                alert("Error: " + err.message);
                location.reload();
            }
        };
    </script>
</body>
</html>
