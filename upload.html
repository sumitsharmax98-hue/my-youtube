<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-2xl mx-auto">
        <nav class="flex justify-between mb-10 items-center">
            <h1 class="text-3xl font-black text-red-600">SumitTube</h1>
            <a href="index.html" class="text-gray-400 hover:text-white">← Back to Home</a>
        </nav>

        <div class="border-2 border-dashed border-gray-800 rounded-[2rem] p-12 text-center bg-gray-900/40 backdrop-blur-md">
            <div id="uploadUI">
                <div class="text-6xl mb-6">📤</div>
                <h2 class="text-2xl font-bold mb-4">Upload to Cloud</h2>
                <input type="file" id="fileInput" accept="video/*" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" 
                    class="bg-red-600 hover:bg-red-700 px-10 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">
                    SELECT VIDEO FILE
                </button>
            </div>

            <div id="statusUI" class="hidden py-10">
                <div class="animate-spin h-12 w-12 border-4 border-red-600 border-t-transparent rounded-full mx-auto mb-6"></div>
                <p id="statusMsg" class="text-xl font-bold text-red-500">Starting Upload...</p>
                <p id="subMsg" class="text-gray-500 text-sm mt-2">Please do not close this tab</p>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ CONFIGURATION ---
        const CLOUD_NAME = "dkyka4sut";
        const UPLOAD_PRESET = "free-upload";
        
        // Token Security Bypass
        const p1 = "ghp_9DJgaUnRAe";
        const p2 = "Cpz20eA4se1T";
        const p3 = "vUemLBY00v2b6L";
        const GITHUB_TOKEN = p1 + p2 + p3;

        const REPO_OWNER = "sumitsharmax98-hue";
        const REPO_NAME = "my-youtube";

        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('uploadUI').classList.add('hidden');
            document.getElementById('statusUI').classList.remove('hidden');
            const statusMsg = document.getElementById('statusMsg');

            try {
                // 1. CLOUDINARY UPLOAD
                statusMsg.innerText = "Step 1: Uploading to Cloudinary...";
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                    method: 'POST', body: formData
                });
                const cloudData = await cloudRes.json();
                if (!cloudData.secure_url) throw new Error("Cloudinary upload failed!");

                // 2. FETCH CURRENT DATA.JSON FROM GITHUB
                statusMsg.innerText = "Step 2: Connecting to GitHub...";
                const ghGet = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json?t=${new Date().getTime()}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });

                if (!ghGet.ok) throw new Error("GitHub File Not Found! Code: " + ghGet.status);
                const ghFileData = await ghGet.json();
                
                // Safely Decode JSON (handling Hindi/UTF-8)
                const contentText = decodeURIComponent(escape(atob(ghFileData.content)));
                const db = JSON.parse(contentText);
                if (!db.videos) db.videos = [];

                // 3. ADD NEW VIDEO TO LIST
                db.videos.unshift({
                    url: cloudData.secure_url,
                    name: file.name,
                    size: (file.size / 1048576).toFixed(1) + " MB",
                    time: new Date().toLocaleString('hi-IN')
                });

                // 4. PUSH UPDATED DATA TO GITHUB
                statusMsg.innerText = "Step 3: Saving to Database...";
                const safeContent = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));

                const ghPut = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        message: "Video Added: " + file.name,
                        content: safeContent,
                        sha: ghFileData.sha
                    })
                });

                if (ghPut.ok) {
                    statusMsg.innerText = "Success! ✅";
                    setTimeout(() => window.location.href = 'index.html', 2500);
                } else {
                    throw new Error("Final Sync Failed!");
                }

            } catch (err) {
                alert("Error: " + err.message);
                location.reload();
            }
        };
    </script>
</body>
</html>
