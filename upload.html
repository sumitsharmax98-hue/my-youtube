<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - SumitTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-2xl mx-auto">
        <nav class="flex justify-between mb-10">
            <h1 class="text-2xl font-bold text-red-500">SumitTube</h1>
            <a href="index.html" class="text-gray-400">Back</a>
        </nav>

        <div class="border-2 border-dashed border-gray-700 rounded-3xl p-10 text-center bg-gray-900/50">

            <!-- Upload UI -->
            <div id="uploadContent">
                <h2 class="text-2xl font-bold mb-4">Upload Video</h2>

                <input type="file" id="fileInput" accept="video/*" class="hidden">

                <button onclick="document.getElementById('fileInput').click()" 
                    class="bg-red-600 px-10 py-4 rounded-xl font-bold shadow-lg">
                    Select Video
                </button>
            </div>

            <!-- Loading UI -->
            <div id="statusUI" class="hidden">
                <div class="animate-spin h-10 w-10 border-4 border-red-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p id="msg" class="text-xl font-bold text-red-400">Uploading...</p>
            </div>

        </div>
    </div>

<script>
/* ================= CONFIG ================= */
const CLOUD_NAME = "dkyka4sut";
const UPLOAD_PRESET = "free-upload";

/* ⚠️ अपना नया token डालो (पुराना revoke कर देना) */
const GITHUB_TOKEN = "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";

const REPO_OWNER = "sumitsharmax98-hue";
const REPO_NAME = "my-youtube";

/* ================= MAIN ================= */
const fileInput = document.getElementById('fileInput');

fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('uploadContent').classList.add('hidden');
    document.getElementById('statusUI').classList.remove('hidden');

    try {
        /* ---------- STEP 1: Cloudinary ---------- */
        document.getElementById('msg').innerText = "Uploading to Cloudinary...";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
            method: 'POST',
            body: formData
        });

        const cloudData = await cloudRes.json();

        if (!cloudData.secure_url) {
            throw new Error("Cloudinary upload failed!");
        }

        /* ---------- STEP 2: GitHub ---------- */
        document.getElementById('msg').innerText = "Updating GitHub...";

        const ghGet = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json?t=${Date.now()}`, {
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`
            }
        });

        if (!ghGet.ok) throw new Error("GitHub fetch failed!");

        const ghData = await ghGet.json();

        // ✅ SAFE decode (Unicode fix)
        const decodedContent = decodeURIComponent(escape(atob(ghData.content)));
        const jsonData = JSON.parse(decodedContent);

        if (!jsonData.videos) jsonData.videos = [];

        // New video object
        const newVideo = {
            url: cloudData.secure_url,
            name: file.name,
            size: (file.size / 1048576).toFixed(1) + " MB",
            time: new Date().toLocaleString('hi-IN')
        };

        jsonData.videos.unshift(newVideo);

        /* ---------- STEP 3: Push to GitHub ---------- */
        await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`, {
            method: 'PUT',
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "Upload: " + file.name,
                // ✅ Unicode SAFE encode
                content: btoa(unescape(encodeURIComponent(JSON.stringify(jsonData, null, 2)))),
                sha: ghData.sha
            })
        });

        document.getElementById('msg').innerText = "Upload Complete ✅";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 2000);

    } catch (err) {
        alert("Error: " + err.message);
        location.reload();
    }
};
</script>

</body>
</html>
